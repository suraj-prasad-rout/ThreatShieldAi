<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- NO inline scripts allowed in MV3 - all JS in popup.js -->
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 300px;
    background: #0a0f0e;
    color: #d4e8e4;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
  }
  .header {
    background: #0f1614;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #1e2e2c;
  }
  .logo {
    width: 32px; height: 32px;
    background: #0f6e56;
    border: 1px solid #1d9e75;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .title { font-weight: 600; font-size: 14px; }
  .subtitle { font-size: 10px; color: #3a5e58; font-family: Consolas, monospace; }
  .status-bar {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0d1e1a;
    border-bottom: 1px solid #1e2e2c;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25c791;
    margin-right: 8px;
    display: inline-block;
    animation: pulse 2s infinite;
  }
  .status-dot.off { background: #555; animation: none; }
  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.4; }
  }
  .toggle-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid #1d9e75;
    background: transparent;
    color: #25c791;
    font-size: 11px;
    cursor: pointer;
    font-family: Consolas, monospace;
    transition: all .15s;
  }
  .toggle-btn:hover { background: #0f6e56; }
  .toggle-btn.off { border-color: #555; color: #7a9e98; }
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #1e2e2c;
    border-bottom: 1px solid #1e2e2c;
  }
  .stat {
    background: #0f1614;
    padding: 12px 16px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px;
    font-weight: 700;
    font-family: Consolas, monospace;
    color: #25c791;
  }
  .stat-num.red { color: #e8503a; }
  .stat-lbl {
    font-size: 9px;
    color: #3a5e58;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
    font-family: Consolas, monospace;
  }
  .actions {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-bottom: 1px solid #1e2e2c;
  }
  .action-btn {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #1e2e2c;
    background: #141e1c;
    color: #7a9e98;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .action-btn:hover { background: #1a2826; color: #d4e8e4; }
  .footer {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .daemon-status { font-size: 10px; font-family: Consolas, monospace; color: #3a5e58; }
  .daemon-status.ok { color: #1d9e75; }
  .clear-btn {
    font-size: 10px; color: #3a5e58;
    cursor: pointer; background: none; border: none; padding: 0;
  }
  .clear-btn:hover { color: #7a9e98; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🛡</div>
  <div>
    <div class="title">ThreatShield AI</div>
    <div class="subtitle">Web Protection v2.0</div>
  </div>
</div>

<div class="status-bar">
  <div style="display:flex;align-items:center">
    <span class="status-dot" id="dot"></span>
    <span id="status-text">Active — Protecting you</span>
  </div>
  <button class="toggle-btn" id="toggle-btn">DISABLE</button>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-num red" id="blocked-count">0</div>
    <div class="stat-lbl">Blocked Today</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="daemon-count">—</div>
    <div class="stat-lbl">Total Threats</div>
  </div>
</div>

<div class="actions">
  <button class="action-btn" id="btn-dashboard">
    <span>⬡</span> Open ThreatShield Dashboard
  </button>
  <button class="action-btn" id="btn-check">
    <span>◈</span> Check Current Page
  </button>
</div>

<div class="footer">
  <span class="daemon-status" id="daemon-status">● Checking daemon...</span>
  <button class="clear-btn" id="btn-clear">Reset counter</button>
</div>

<!-- External script only — inline scripts violate MV3 CSP -->
<script src="popup.js"></script>
</body>
</html>
